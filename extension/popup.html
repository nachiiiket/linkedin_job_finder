<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="icons/icon48.png" alt="icon" class="popup-icon">
      <h1>LinkedIn Job Finder</h1>
    </div>

    <div id="statusSection" class="status-section">
      <div class="status-row">
        <span class="label">Status</span>
        <span id="statusText" class="status-idle">Idle</span>
      </div>
      <div class="stats-row">
        <div class="stat">
          <span id="statTotal" class="stat-number">0</span>
          <span class="stat-label">Jobs Found</span>
        </div>
        <div class="stat">
          <span id="statApplied" class="stat-number">0</span>
          <span class="stat-label">Applied</span>
        </div>
        <div class="stat">
          <span id="statConnected" class="stat-number">0</span>
          <span class="stat-label">Connected</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="btnStart" class="btn btn-primary">Start Scraping</button>
      <button id="btnStop" class="btn btn-danger" style="display:none">Stop</button>
      <button id="btnDashboard" class="btn btn-secondary">Dashboard</button>
    </div>

    <div id="logSection" class="log-section">
      <div class="log-header">Log</div>
      <div id="logList" class="log-list"></div>
    </div>
  </div>
  <script src="utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
